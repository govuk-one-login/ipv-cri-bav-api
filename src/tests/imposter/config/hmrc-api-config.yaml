plugin: openapi
specFile: ./hmrc-api.yaml

pickFirstIfNoneMatch: false

validation:
  request: true

# system:
#   stores:
#     questions:
#       # Preload data from this file so it's ready when imposter starts
#       preloadFile: data/questions.json

resources:
  - path: /oauth/token
    method: POST
    requestBody:
      xPath: "/env:Envelope/env:Body/pets:animal/pets:name"
      value: "success"
    response:
      # TODO dockerfile seems to ruin this folder structure
      file: token.json
      statusCode: 200